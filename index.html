<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>NEURAILOG</title>

  <style>
    body {
      margin: 0;
      background: white;
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
    }

    .container {
      text-align: center;
      position: relative;
      width: 100%;
      max-width: 300px;
    }

    .container img {
      width: 100%;
      height: auto;
      display: block;
      transition: opacity 0.6s ease, transform 0.6s ease;
    }

    .hover-logo {
      position: absolute;
      top: 0;
      left: 0;
      opacity: 0;
    }

    .container:hover .hover-logo {
      opacity: 1;
    }

    .container:hover .base-logo {
      opacity: 0;
    }

    /* subtle zoom effect */
    .container:hover img {
      transform: scale(1.5);
    }

    @media (min-width: 600px) {
      .container {
        max-width: 300px;
      }
    }
  </style>
</head>

<body>
  <div class="container">
    <img src="neurailog.png" class="base-logo" alt="NEURAILOG" />
    <img src="neurailogod.jpeg" class="hover-logo" alt="NEURAILOG Alt" />
  </div>
</body>
</html>
