<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>NEURAILOG</title>

  <style>
    :root {
      --bg: white;
    }

    body.dark {
      --bg: #0a0a0a;
    }

    body {
      margin: 0;
      background: var(--bg);
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
      transition: background 0.6s ease;
    }

    .container {
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 20px;
      width: 100%;
    }

    .image-stack {
      position: relative;
      width: 100%;
      max-width: 600px;
    }

    /* THIS fixes the height issue */
    .image-stack::before {
      content: "";
      display: block;
      padding-top: 100%; /* square ratio (Krishna is square) */
    }

    .image-stack.logo-stack::before {
      padding-top: 25%; /* adjust based on your logo aspect ratio */
    }

    .image-stack img {
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      object-fit: contain;
      transition: opacity 0.6s ease;
    }

    .light { opacity: 1; }
    .dark-img { opacity: 0; }

    body.dark .light { opacity: 0; }
    body.dark .dark-img { opacity: 1; }

    .logo-stack {
      margin-top: 16px;
    }

    /* Toggle */
    .toggle {
      position: absolute;
      top: 20px;
      right: 20px;
      cursor: pointer;
      width: 40px;
      height: 40px;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .toggle svg {
      width: 24px;
      height: 24px;
      stroke: black;
      transition: all 0.6s ease;
    }

    body.dark .toggle svg {
      stroke: white;
    }

    .sun { opacity: 1; }
    .moon { opacity: 0; position: absolute; }

    body.dark .sun { opacity: 0; }
    body.dark .moon { opacity: 1; }

    @media (max-width: 600px) {
      .image-stack {
        max-width: 90vw;
      }
    }
  </style>
</head>

<body>

  <!-- Toggle -->
  <div class="toggle" onclick="document.body.classList.toggle('dark')">
    <svg class="sun" fill="none" stroke-width="2" viewBox="0 0 24 24">
      <circle cx="12" cy="12" r="5"></circle>
      <path d="M12 1v2M12 21v2M4.22 4.22l1.42 1.42M18.36 18.36l1.42 1.42M1 12h2M21 12h2M4.22 19.78l1.42-1.42M18.36 5.64l1.42-1.42"></path>
    </svg>
    <svg class="moon" fill="none" stroke-width="2" viewBox="0 0 24 24">
      <path d="M21 12.79A9 9 0 1111.21 3 
               7 7 0 0021 12.79z"></path>
    </svg>
  </div>

  <div class="container">

    <!-- Krishna (square) -->
    <div class="image-stack">
      <img src="krishna-light.png" class="light" alt="KRISHNA" />
      <img src="krishna-dark.png" class="dark-img" alt="KRISHNA" />
    </div>

    <!-- Logo -->
    <div class="image-stack logo-stack">
      <img src="neurailog-logo-light.png" class="light" alt="NEURAILOG" />
      <img src="neurailog-logo-dark.png" class="dark-img" alt="NEURAILOG" />
    </div>

  </div>

</body>
</html>
